# docker-compose.yml
# نشر النظام الكامل بأمر واحد: docker-compose up -d
#
# الخدمات:
#   db        — PostgreSQL 16
#   backend   — Flask API + Socket.IO
#   dashboard — React (served by Nginx)
#   nginx     — Reverse proxy (port 80/443)

version: "3.9"

services:

  # ─── PostgreSQL ─────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: voting_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       voting_system
      POSTGRES_USER:     voting_admin
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./backend/database/views_functions.sql:/docker-entrypoint-initdb.d/02_views.sql:ro
      - ./backend/database/seed_data.sql:/docker-entrypoint-initdb.d/03_seed.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voting_admin -d voting_system"]
      interval: 10s
      timeout:  5s
      retries:  5
    networks:
      - voting_net

  # ─── Flask Backend ──────────────────────────────────────────
  backend:
    build:
      context:    ./backend
      dockerfile: Dockerfile
    container_name: voting_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST:              db
      DB_PORT:              "5432"
      DB_NAME:              voting_system
      DB_USER:              voting_admin
      DB_PASSWORD:          ${DB_PASSWORD}
      SECRET_KEY:           ${SECRET_KEY}
      PUBLIC_KEY_PATH:      /app/secure/public_key.pem
      PRIVATE_KEY_PATH:     /app/secure/private_key_encrypted.pem
      FLASK_DEBUG:          "False"
      API_PORT:             "5000"
      ALLOWED_ORIGINS:      "http://localhost,http://localhost:3000,http://${SERVER_IP}"
      SESSION_EXPIRY_HOURS: "8"
      VOTING_OPEN:          "True"
      ELECTION_YEAR:        "2026"
    volumes:
      - ./secure:/app/secure:ro
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 15s
      timeout:  10s
      retries:  3
      start_period: 20s
    networks:
      - voting_net

  # ─── React Dashboard ────────────────────────────────────────
  dashboard:
    build:
      context:    ./dashboard
      dockerfile: Dockerfile
    container_name: voting_dashboard
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"
    networks:
      - voting_net

  # ─── Nginx Reverse Proxy ────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: voting_nginx
    restart: unless-stopped
    depends_on:
      - backend
      - dashboard
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - voting_net

# ─── Volumes ────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local

# ─── Networks ───────────────────────────────────────────────
networks:
  voting_net:
    driver: bridge
