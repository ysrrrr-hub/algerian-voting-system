# nginx/nginx.conf
# Reverse Proxy للنظام الكامل
# يُوجّه:
#   /api/*        → Flask backend :5000
#   /socket.io/*  → Flask Socket.IO :5000
#   /*            → React dashboard :3000

worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ─── Logging ─────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    # ─── Performance ─────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    gzip               on;
    gzip_types         text/plain text/css application/json
                       application/javascript text/xml;

    # ─── Security Headers ────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"    always;
    add_header X-Content-Type-Options    "nosniff"       always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "no-referrer"   always;
    server_tokens off;

    # ─── Rate limiting ───────────────────────────────────────
    # حماية ضد الإرسال الزائد على نقطة التصويت
    limit_req_zone $binary_remote_addr zone=vote_limit:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=api_limit:10m  rate=30r/m;

    # ─── Upstream ────────────────────────────────────────────
    upstream flask_backend {
        server backend:5000;
        keepalive 16;
    }

    upstream react_dashboard {
        server dashboard:80;
    }

    # ─── HTTP → HTTPS redirect ───────────────────────────────
    server {
        listen 80;
        server_name _;

        # Health check for load balancer (no redirect)
        location /health {
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─── HTTPS Main Server ───────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name _;

        # ── SSL ──────────────────────────────────────────────
        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        client_max_body_size 1m;

        # ── Flask API ─────────────────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=10 nodelay;

            proxy_pass         http://flask_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
            proxy_connect_timeout 5s;
        }

        # ── نقطة التصويت — rate limit مشدَّد ─────────────────
        location /api/vote {
            limit_req zone=vote_limit burst=2 nodelay;

            proxy_pass         http://flask_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── Socket.IO (WebSocket) ─────────────────────────────
        location /socket.io/ {
            proxy_pass         http://flask_backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_read_timeout 86400s;   # keepalive طويل للـ WebSocket
        }

        # ── React Dashboard ───────────────────────────────────
        location / {
            proxy_pass         http://react_dashboard;
            proxy_http_version 1.1;
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

            # للـ SPA: إذا لم يُعثر على الملف → index.html
            proxy_intercept_errors on;
            error_page 404 = /index.html;
        }
    }
}
